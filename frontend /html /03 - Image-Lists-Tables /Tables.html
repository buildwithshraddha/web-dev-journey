<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tables</title>
    <style>
        td {
            border: 2px solid black;
        }
    </style>
</head>

<body>
    <br>
    <table>
        <caption>Employee Details</caption>
        <thead>
            <tr>
                <th>Name</th>
                <th>Designation</th>
                <th>Fav Language</th>
            </tr>
        </thead>

        <tbody>
            <tr>
                <td>Shraddha</td>
                <td>Programmer</td>
                <td>JavaScript</td>
            </tr>

            <tr>
                <td colspan="2">Mahesh</td>
                <td rowspan="2">Java</td>
            </tr>

            <tr>
                <td colspan="2">Mahesh</td>

            </tr>
        </tbody>
        <tfoot>
            <tr>
                <td colspan="2">Mahesh</td>
                <td rowspan="2">Java</td>
            </tr>
        </tfoot>

    </table>
</body>

</html>
